<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
  margin: 0;
  background: #f5efe6;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
}

/* INICIO */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f5efe6;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  animation: fadeOut 1.5s ease forwards;
  animation-delay: 2.5s;
}

#inicio span {
  font-size: 80px;
  animation: girar 2s linear infinite;
}

#inicio p {
  margin-top: 10px;
  font-size: 22px;
  color: #333;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* TEXTO */
.mensaje {
  position: absolute;
  top: 8%;
  width: 100%;
  font-size: 26px;
  color: #333;
  opacity: 0;
  animation: aparecer 1.5s ease forwards;
  animation-delay: 3s;
}

/* CONTADOR */
#tiempo {
  position: absolute;
  bottom: 20px;
  width: 100%;
  font-size: 24px;
  font-weight: bold;
  opacity: 0;
  animation: aparecer 1.5s ease forwards;
  animation-delay: 4s;
}

@keyframes aparecer {
  to { opacity: 1; }
}

/* TRONCO */
.tronco {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 15px;
  height: 200px;
  background: #5c3d2e;
  transform: translateX(-50%);
}

/* FLORES */
.flor {
  position: absolute;
  font-size: 16px;
}

/* CAÍDA */
.caida {
  position: absolute;
  font-size: 16px;
  animation: caer linear forwards;
}

@keyframes caer {
  from { transform: translateY(-20px); }
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <span>🌻</span>
  <p>Te amo cielo 💛</p>
</div>

<!-- TEXTO -->
<div class="mensaje">
  <b>Flores Amarillas para ti 💛</b><br><br>

  Quiero ser el ratito que siempre vas a elegir ❤️<br><br>

  Quiero ser el que marque la diferencia y el que te va a amar cada segundo que tenga 💛<br><br>

  Te amo un montón mi pequeña bujía 🌻<br><br>

  Más aventuras nos esperan… ✨
</div>

<div id="tiempo"></div>
<div class="tronco"></div>

<script>
// 🌻 CORAZÓN RELLENO
function crearFlor(x, y) {
  const flor = document.createElement("div");
  flor.className = "flor";
  flor.innerHTML = "🌻";
  flor.style.left = x + "px";
  flor.style.top = y + "px";
  document.body.appendChild(flor);
}

function dibujarCorazon() {
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight * 0.45;

  for (let t = 0; t < Math.PI * 2; t += 0.03) {
    for (let r = 0; r < 10; r++) { // RELLENO 🔥
      let x = (16 * Math.pow(Math.sin(t), 3)) * (r/10);
      let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r/10);

      x = centerX + x * 10;
      y = centerY + y * 10;

      crearFlor(x, y);
    }
  }
}

setTimeout(dibujarCorazon, 2500);

// 🌻 FLORES CAYENDO
function crearCaida() {
  const flor = document.createElement("div");
  flor.className = "caida";
  flor.innerHTML = "🌻";

  flor.style.left = Math.random() * window.innerWidth + "px";
  flor.style.animationDuration = (3 + Math.random() * 4) + "s";

  document.body.appendChild(flor);

  setTimeout(() => flor.remove(), 7000);
}

setInterval(crearCaida, 150);

// ⏱️ CONTADOR
const inicio = new Date("2026-01-30T08:40:00");

function actualizarTiempo() {
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor(diff / (1000 * 60 * 60)) % 24;
  const minutos = Math.floor(diff / (1000 * 60)) % 60;
  const segundos = Math.floor(diff / 1000) % 60;

  document.getElementById("tiempo").innerText =
    `${dias} días ${horas}h ${minutos}m ${segundos}s contigo 💛`;
}

setInterval(actualizarTiempo, 1000);
</script>

</body>
</html>
