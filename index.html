<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores para ti 💛</title>

<!-- FUENTE BONITA -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5efe6;
  overflow: hidden;
  font-family: 'Dancing Script', cursive;
}

/* INICIO */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f5efe6;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  animation: fadeOut 1.5s ease forwards;
  animation-delay: 2.5s;
}

#inicio span {
  font-size: 100px;
  animation: girar 2s linear infinite;
}

#inicio p {
  font-size: 30px;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* CONTENEDOR */
.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 20px;
}

/* TEXTO A LA IZQUIERDA */
.mensaje {
  width: 50%;
  font-size: 28px;
  color: #333;
  line-height: 1.5;
  animation: aparecer 2s ease forwards;
  opacity: 0;
  animation-delay: 3s;
}

/* CONTADOR */
#tiempo {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
}

@keyframes aparecer {
  to { opacity: 1; }
}

/* ZONA DEL CORAZÓN */
.corazon-container {
  position: relative;
  width: 50%;
  height: 100%;
}

/* TRONCO */
.tronco {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 15px;
  height: 180px;
  background: #5c3d2e;
  transform: translateX(-50%);
}

/* FLORES */
.flor {
  position: absolute;
  font-size: 16px;
}

/* FLORES CAYENDO */
.caida {
  position: absolute;
  font-size: 14px;
  animation: caer linear forwards;
}

@keyframes caer {
  from { transform: translateY(-20px); }
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="inicio">
  <span>🌻</span>
  <p>Te amo cielo 💛</p>
</div>

<div class="container">

  <!-- TEXTO -->
  <div class="mensaje">
    <b>Flores Amarillas para ti 💛</b><br><br>

    Quiero ser el ratito que siempre vas a elegir ❤️<br><br>

    Quiero ser el que marque la diferencia y el que te va a amar cada segundo que tenga 💛<br><br>

    Te amo un montón mi pequeña bujía 🌻<br><br>

    Más aventuras nos esperan… ✨

    <div id="tiempo"></div>
  </div>

  <!-- CORAZÓN -->
  <div class="corazon-container" id="zona">
    <div class="tronco" id="tronco"></div>
  </div>

</div>

<script>
// 🌻 CREAR FLOR
function crearFlor(x, y) {
  const flor = document.createElement("div");
  flor.className = "flor";
  flor.innerHTML = "🌻";
  document.getElementById("zona").appendChild(flor);

  flor.style.left = x + "px";
  flor.style.top = y + "px";
}

// ❤️ CORAZÓN PEQUEÑO
function dibujarCorazon() {
  const zona = document.getElementById("zona");
  const centerX = zona.offsetWidth / 2;
  const centerY = zona.offsetHeight * 0.4;

  for (let t = 0; t < Math.PI * 2; t += 0.04) {
    for (let r = 0; r < 8; r++) {
      let x = (16 * Math.pow(Math.sin(t), 3)) * (r/8);
      let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r/8);

      x = centerX + x * 6; // MÁS PEQUEÑO
      y = centerY + y * 6;

      crearFlor(x, y);
    }
  }

  // 📌 PEGAR TRONCO
  const tronco = document.getElementById("tronco");
  tronco.style.left = centerX + "px";
}

setTimeout(dibujarCorazon, 2500);

// 🌻 FLORES CAYENDO
function crearCaida() {
  const flor = document.createElement("div");
  flor.className = "caida";
  flor.innerHTML = "🌻";

  flor.style.left = Math.random() * window.innerWidth + "px";
  flor.style.animationDuration = (3 + Math.random() * 4) + "s";

  document.body.appendChild(flor);

  setTimeout(() => flor.remove(), 6000);
}

setInterval(crearCaida, 200);

// ⏱️ CONTADOR
const inicio = new Date("2026-01-30T08:40:00");

function actualizarTiempo() {
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor(diff / (1000 * 60 * 60)) % 24;
  const minutos = Math.floor(diff / (1000 * 60)) % 60;
  const segundos = Math.floor(diff / 1000) % 60;

  document.getElementById("tiempo").innerText =
    `${dias} días ${horas}h ${minutos}m ${segundos}s contigo 💛`;
}

setInterval(actualizarTiempo, 1000);
</script>

</body>
</html>
