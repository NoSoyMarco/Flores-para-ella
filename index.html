<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
  margin: 0;
  background: #f5efe6;
  overflow: hidden;
  font-family: Arial;
}

/* PANTALLA INICIAL */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f5efe6;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  animation: fadeOut 1.5s ease forwards;
  animation-delay: 2.5s;
}

#inicio span {
  font-size: 80px;
  animation: zoom 2.5s ease;
}

@keyframes zoom {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1.2); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* TEXTO */
.mensaje {
  position: absolute;
  top: 8%;
  left: 5%;
  width: 55%;
  font-size: 28px;
  line-height: 1.4;
  color: #333;
  opacity: 0;
  transform: translateY(20px);
  animation: aparecer 1.5s ease forwards;
  animation-delay: 3s;
}

/* CONTADOR */
#tiempo {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 24px;
  font-weight: bold;
  opacity: 0;
  animation: aparecer 1.5s ease forwards;
  animation-delay: 4s;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* TRONCO */
.tronco {
  position: absolute;
  bottom: 0;
  left: 75%;
  width: 20px;
  height: 250px;
  background: #5c3d2e;
}

/* GIRASOLES */
.flor {
  position: absolute;
  font-size: 16px;
}

/* FLORES CAYENDO */
.caida {
  position: absolute;
  font-size: 16px;
  animation: caer linear forwards;
}

@keyframes caer {
  from { transform: translateY(-20px); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- GIRASOL INICIAL -->
<div id="inicio">
  <span>🌻</span>
</div>

<!-- MENSAJE -->
<div class="mensaje">
  <b>Flores Amarillas para ti 💛</b><br><br>

  Quiero ser el ratito que siempre vas a elegir ❤️<br><br>

  Quiero ser el que marque la diferencia y el que te va a amar cada segundo que tenga 💛<br><br>

  Te amo un montón mi pequeña bujía 🌻<br><br>

  Más aventuras nos esperan… ✨
</div>

<div id="tiempo"></div>
<div class="tronco"></div>

<script>
// ❤️ CORAZÓN MÁS DENSO
function crearFlor(x, y) {
  const flor = document.createElement("div");
  flor.className = "flor";
  flor.innerHTML = "🌻";
  flor.style.left = x + "px";
  flor.style.top = y + "px";
  document.body.appendChild(flor);
}

function dibujarCorazon() {
  const centerX = window.innerWidth * 0.75;
  const centerY = window.innerHeight * 0.4;

  for (let t = 0; t < Math.PI * 2; t += 0.02) { // MÁS DENSO 🔥
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
      - 2 * Math.cos(3*t) - Math.cos(4*t));

    x = centerX + x * 10;
    y = centerY + y * 10;

    crearFlor(x, y);
  }
}

// se dibuja después del inicio
setTimeout(dibujarCorazon, 2500);

// 🌻 FLORES CAYENDO
function crearCaida() {
  const flor = document.createElement("div");
  flor.className = "caida";
  flor.innerHTML = "🌻";

  flor.style.left = Math.random() * window.innerWidth + "px";
  flor.style.animationDuration = (3 + Math.random() * 4) + "s";

  document.body.appendChild(flor);

  setTimeout(() => flor.remove(), 7000);
}

setInterval(crearCaida, 150);

// ⏱️ CONTADOR GRANDE
const inicio = new Date("2026-01-30T08:40:00");

function actualizarTiempo() {
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor(diff / (1000 * 60 * 60)) % 24;
  const minutos = Math.floor(diff / (1000 * 60)) % 60;
  const segundos = Math.floor(diff / 1000) % 60;

  document.getElementById("tiempo").innerText =
    `${dias} días ${horas}h ${minutos}m ${segundos}s contigo 💛`;
}

setInterval(actualizarTiempo, 1000);
</script>

</body>
</html>
