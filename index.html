<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores para ti 💛</title>

<!-- FUENTE BONITA -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f5efe6;
  font-family: 'Great Vibes', cursive;
  overflow: hidden;
}

/* INICIO */
#inicio {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f5efe6;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  animation: fadeOut 1.5s ease forwards;
  animation-delay: 2.5s;
}

#inicio span {
  font-size: 90px;
  animation: girar 2s linear infinite;
}

#inicio p {
  font-size: 28px;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* CONTENEDOR */
.container {
  display: flex;
  height: 100vh;
}

/* TEXTO */
.mensaje {
  width: 50%;
  padding: 25px;
  font-size: 26px;
  line-height: 1.8; /* MÁS SEPARADO 🔥 */
  color: #333;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* CONTADOR */
#tiempo {
  margin-top: 20px;
  font-size: 20px;
}

/* ZONA CORAZÓN */
.corazon-container {
  width: 50%;
  position: relative;
}

/* TRONCO */
.tronco {
  position: absolute;
  width: 10px;
  height: 110px;
  background: #5c3d2e;
  bottom: 0;
}

/* FLORES */
.flor {
  position: absolute;
  font-size: 14px;
}

/* FLORES CAYENDO */
.caida {
  position: absolute;
  font-size: 12px;
  animation: caer linear forwards;
}

@keyframes caer {
  from { transform: translateY(-20px); }
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="inicio">
  <span>🌻</span>
  <p>Te amo cielo 💛</p>
</div>

<div class="container">

  <!-- TEXTO -->
  <div class="mensaje">
    <b>Flores Amarillas para ti 💛</b><br><br>

    Quiero ser el rarito que siempre vas a elegir ❤️<br><br>

    Quiero ser el que marque la diferencia y el que te va a amar cada segundo que tenga 💛<br><br>

    Te amo un montón mi pequeña bujía 🌻<br><br>

    Más aventuras nos esperan… ✨

    <div id="tiempo"></div>
  </div>

  <!-- CORAZÓN -->
  <div class="corazon-container" id="zona">
    <div class="tronco" id="tronco"></div>
  </div>

</div>

<script>
// 🌻 CREAR FLOR
function crearFlor(x, y) {
  const flor = document.createElement("div");
  flor.className = "flor";
  flor.innerHTML = "🌻";
  document.getElementById("zona").appendChild(flor);

  flor.style.left = x + "px";
  flor.style.top = y + "px";
}

// ❤️ CORAZÓN + BASE REAL
function dibujarCorazon() {
  const zona = document.getElementById("zona");
  const centerX = zona.offsetWidth / 2;
  const centerY = zona.offsetHeight * 0.45;

  let puntos = [];

  for (let t = 0; t < Math.PI * 2; t += 0.05) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
      - 2 * Math.cos(3*t) - Math.cos(4*t));

    x = centerX + x * 4;
    y = centerY + y * 4;

    puntos.push({x, y});
    crearFlor(x, y);
  }

  // 🔥 ESTE ES EL FIX REAL
  // encontrar el punto más bajo del corazón
  let base = puntos.reduce((a, b) => a.y > b.y ? a : b);

  const tronco = document.getElementById("tronco");

  // pegar EXACTO al corazón
  tronco.style.left = (base.x - 5) + "px"; // centrado
  tronco.style.top = base.y + "px";
}

setTimeout(dibujarCorazon, 2500);

// 🌻 FLORES CAYENDO
function crearCaida() {
  const flor = document.createElement("div");
  flor.className = "caida";
  flor.innerHTML = "🌻";

  flor.style.left = Math.random() * window.innerWidth + "px";
  flor.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(flor);

  setTimeout(() => flor.remove(), 5000);
}

setInterval(crearCaida, 250);

// ⏱️ CONTADOR
const inicio = new Date("2026-01-30T08:40:00");

function actualizarTiempo() {
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor(diff / (1000 * 60 * 60)) % 24;
  const minutos = Math.floor(diff / (1000 * 60)) % 60;
  const segundos = Math.floor(diff / 1000) % 60;

  document.getElementById("tiempo").innerText =
    `${dias} días ${horas}h ${minutos}m ${segundos}s contigo 💛`;
}

setInterval(actualizarTiempo, 1000);
</script>

</body>
</html>
